name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest
          clj-kondo: latest

      - name: Lint core
        run: clj-kondo --lint core/src

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: ["21", "17"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}

      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('core/deps.edn') }}
          restore-keys: m2-

      - name: Test core
        working-directory: core
        run: clj -M:test
