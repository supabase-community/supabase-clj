name: Publish to Clojars

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Add a module here once it has build.clj + version.txt + :build alias
        # AND a corresponding entry in .github/release-please-config.json.
        module: [core, auth]
    # Skip rows whose module name doesn't match the released tag.
    # Tag format: `<module>-vX.Y.Z` (release-please convention).
    if: startsWith(github.event.release.tag_name, format('{0}-v', matrix.module))
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: DeLaGuardo/setup-clojure@13.2
        with:
          cli: latest

      - name: Cache Maven deps
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/deps.edn') }}
          restore-keys: m2-

      - name: Run module tests
        working-directory: ${{ matrix.module }}
        run: clojure -M:test

      - name: Build JAR
        working-directory: ${{ matrix.module }}
        run: clojure -T:build jar

      - name: Deploy to Clojars
        working-directory: ${{ matrix.module }}
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:build deploy
